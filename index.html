<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #111114;
    --surface2: #18181d;
    --border: #2a2a35;
    --accent: #c8f25a;
    --accent2: #f25a8a;
    --accent3: #5ac8f2;
    --text: #e8e8f0;
    --muted: #666680;
    --mono: 'Space Mono', monospace;
    --serif: 'Instrument Serif', serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* UPLOAD SCREEN */
  #upload-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 2rem;
    padding: 2rem;
  }

  .upload-title {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(2.5rem, 6vw, 5rem);
    text-align: center;
    line-height: 1;
    color: var(--text);
  }

  .upload-title span {
    color: var(--accent);
  }

  .upload-sub {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
  }

  .drop-zone {
    width: min(500px, 100%);
    height: 220px;
    border: 1px dashed var(--border);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    background: var(--surface);
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: #111114ee;
  }

  .drop-zone .drop-icon {
    font-size: 2.5rem;
    opacity: 0.5;
  }

  .drop-zone p {
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }

  .drop-zone p strong {
    color: var(--accent);
  }

  #file-input { display: none; }

  .btn {
    background: var(--accent);
    color: #0a0a0c;
    border: none;
    padding: 0.6rem 1.5rem;
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover { background: #d9ff6a; }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: transparent; }

  /* MAIN APP */
  #app { display: none; }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.5rem;
    color: var(--accent);
  }

  .header-actions { display: flex; gap: 0.75rem; align-items: center; }

  /* FILTERS */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }

  .filter-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-right: 0.5rem;
  }

  select, input[type="month"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 0.4rem 0.8rem;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    border-radius: 2px;
    transition: border-color 0.15s;
  }

  select:focus, input[type="month"]:focus { border-color: var(--accent); }

  .chip {
    padding: 0.3rem 0.75rem;
    font-size: 0.7rem;
    font-family: var(--mono);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }

  .chip.active { border-color: var(--accent); color: var(--accent); background: #c8f25a10; }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 2rem;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    padding: 0.8rem 1.2rem;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: var(--mono);
  }

  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--text); }

  /* CONTENT */
  .content { padding: 2rem; }

  /* STATS OVERVIEW */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .stat-card .label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stat-card .value {
    font-family: var(--serif);
    font-style: italic;
    font-size: 2.2rem;
    line-height: 1;
    color: var(--accent);
  }

  .stat-card .sub {
    font-size: 0.65rem;
    color: var(--muted);
  }

  /* RANKING TABLE */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .section-title {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .rank-list { display: flex; flex-direction: column; gap: 2px; }

  .rank-item {
    display: grid;
    grid-template-columns: 2.5rem 1fr auto auto;
    align-items: center;
    gap: 1rem;
    padding: 0.9rem 1rem;
    background: var(--surface);
    border: 1px solid transparent;
    transition: all 0.15s;
    cursor: default;
  }

  .rank-item:hover { border-color: var(--border); background: var(--surface2); }

  .rank-num {
    font-size: 0.65rem;
    color: var(--muted);
    font-weight: 700;
    text-align: right;
  }

  .rank-num.top { color: var(--accent); }

  .rank-info { overflow: hidden; }

  .rank-name {
    font-size: 0.82rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .rank-meta {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.15rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .rank-count {
    font-size: 0.75rem;
    color: var(--accent);
    font-weight: 700;
    white-space: nowrap;
  }

  .rank-bar-container { width: 80px; }

  .rank-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .rank-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* TWO COLUMN LAYOUT */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    margin-bottom: 2rem;
  }

  @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

  /* TIMELINE */
  .timeline-section { margin-bottom: 2rem; }

  .chart-container {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.5rem;
  }

  canvas { display: block; width: 100% !important; }

  /* SEARCH */
  .search-bar {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.8rem;
    padding: 0.7rem 1rem;
    outline: none;
    border-radius: 2px;
    margin-bottom: 1rem;
    transition: border-color 0.15s;
  }

  .search-bar:focus { border-color: var(--accent); }
  .search-bar::placeholder { color: var(--muted); }

  /* HEATMAP */
  .heatmap {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .heatmap-row {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .heatmap-label {
    font-size: 0.6rem;
    color: var(--muted);
    width: 2.5rem;
    text-align: right;
    flex-shrink: 0;
  }

  .heatmap-cell {
    flex: 1;
    height: 28px;
    border-radius: 2px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
    color: transparent;
    transition: all 0.15s;
    cursor: default;
    position: relative;
  }

  .heatmap-cell:hover { transform: scale(1.05); }

  .heatmap-cell .tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 0.3rem 0.5rem;
    font-size: 0.6rem;
    color: var(--text);
    white-space: nowrap;
    z-index: 10;
    pointer-events: none;
  }

  .heatmap-cell:hover .tooltip { display: block; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 0.75rem;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ANIM */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in { animation: fadeIn 0.3s ease forwards; }

  .tag-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }

  .tag {
    padding: 0.25rem 0.6rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 0.65rem;
    color: var(--muted);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tag:hover { border-color: var(--accent); color: var(--accent); }

  .nav-controls { display: flex; align-items: center; gap: 0.5rem; }

  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.8rem;
    padding: 0.2rem 0.6rem;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    line-height: 1.4;
  }

  .nav-btn:hover:not([disabled]) { border-color: var(--accent); color: var(--accent); }
  .nav-btn[disabled] { opacity: 0.25; cursor: default; }

  .nav-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    min-width: 8rem;
    text-align: center;
  }

  /* BREADCRUMB */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 1.5rem;
    font-size: 0.7rem;
    flex-wrap: wrap;
  }

  .bc-link {
    color: var(--muted);
    cursor: pointer;
    transition: color 0.15s;
  }

  .bc-link:hover { color: var(--accent); }

  .bc-sep { color: var(--border); }

  .bc-current {
    color: var(--text);
    font-weight: 700;
  }

  /* DETAIL PAGE */
  .detail-header {
    margin-bottom: 0.5rem;
  }

  .detail-title {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(1.8rem, 4vw, 3rem);
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 0.75rem;
  }

  .detail-stats {
    display: flex;
    gap: 1.5rem;
    font-size: 0.7rem;
    color: var(--muted);
    flex-wrap: wrap;
  }

  /* CLICKABLE LINKS IN LISTS */
  .detail-link {
    color: inherit;
    cursor: pointer;
    transition: color 0.15s;
    text-decoration: none;
  }

  .detail-link:hover { color: var(--accent); }

  .file-name-badge {
    font-size: 0.65rem;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 0.2rem 0.5rem;
    border-radius: 2px;
  }
</style>
</head>
<body>

<!-- UPLOAD SCREEN -->
<div id="upload-screen">
  <div>
    <div class="upload-title">Music<br><span>Stats</span></div>
  </div>
  <p class="upload-sub">Analysez votre historique d'écoute</p>

  <div class="drop-zone" id="drop-zone">
    <div class="drop-icon">♪</div>
    <p>Glissez un ou plusieurs fichiers <strong>JSON</strong> ici<br>ou cliquez pour parcourir</p>
    <button class="btn" onclick="document.getElementById('file-input').click()">Choisir des fichiers</button>
    <input type="file" id="file-input" accept=".json" multiple>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="logo">Music Stats</div>
    <div class="header-actions">
      <span id="file-name-badge" class="file-name-badge"></span>
      <button class="btn btn-outline" id="reset-btn" style="font-size:0.65rem;padding:0.4rem 0.8rem;">↩ Changer de fichier</button>
    </div>
  </header>

  <div class="filters" id="filters">
    <span class="filter-label">Période</span>
    <button class="chip active" data-period="all">Tout</button>
    <button class="chip" data-period="year">Année</button>
    <button class="chip" data-period="month">Mois</button>
    <button class="chip" data-period="week">Semaine</button>
    <span class="filter-label" style="margin-left:1rem">Année</span>
    <select id="year-select"><option value="all">Toutes</option></select>
    <select id="month-select" style="display:none"><option value="all">Tous les mois</option></select>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="overview">Vue d'ensemble</button>
    <button class="tab" data-tab="tracks">Titres</button>
    <button class="tab" data-tab="artists">Artistes</button>
    <button class="tab" data-tab="albums">Albums</button>
    <button class="tab" data-tab="timeline">Timeline</button>
  </div>

  <div class="content" id="content"></div>
</div>

<script>
// =========================================================
// DATA
// =========================================================
let rawData = [];
let filteredData = [];
let currentTab = 'overview';
let currentPeriod = 'all';
let selectedYear = 'all';
let selectedMonth = 'all';

const MONTHS = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const MONTH_FULL = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

// =========================================================
// UPLOAD / INIT
// =========================================================
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const files = [...e.dataTransfer.files].filter(f => f.name.endsWith('.json'));
  if (files.length) loadFiles(files);
});

fileInput.addEventListener('change', e => {
  const files = [...e.target.files];
  if (files.length) loadFiles(files);
});

document.getElementById('reset-btn').addEventListener('click', () => {
  rawData = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('upload-screen').style.display = 'flex';
  fileInput.value = '';
});

function loadFiles(files) {
  const results = [];
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        let parsed = JSON.parse(e.target.result);
        if (!Array.isArray(parsed)) parsed = [parsed];
        results.push(...parsed);
      } catch {
        console.warn('Fichier invalide ignoré :', file.name);
      }
      loaded++;
      if (loaded === files.length) {
        if (results.length === 0) { alert('Aucune donnée valide trouvée.'); return; }
        const label = files.length === 1 ? files[0].name : `${files.length} fichiers`;
        initApp(results, label);
      }
    };
    reader.readAsText(file);
  });
}

// =========================================================
// INIT APP
// =========================================================
function initApp(data, filename) {
  rawData = data.map(d => ({
    ...d,
    date: new Date(d.time),
  }));

  document.getElementById('upload-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('file-name-badge').textContent = filename;

  // Populate year select
  const years = [...new Set(rawData.map(d => d.date.getFullYear()))].sort();
  const yearSel = document.getElementById('year-select');
  yearSel.innerHTML = '<option value="all">Toutes</option>';
  years.forEach(y => yearSel.innerHTML += `<option value="${y}">${y}</option>`);

  // Events
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      currentTab = t.dataset.tab;
      detailView = null;
      detailStack = [];
      render();
    });
  });

  document.querySelectorAll('.chip[data-period]').forEach(c => {
    c.addEventListener('click', () => {
      document.querySelectorAll('.chip[data-period]').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      currentPeriod = c.dataset.period;
      applyFilters();
    });
  });

  yearSel.addEventListener('change', () => {
    selectedYear = yearSel.value;
    const monthSel = document.getElementById('month-select');
    if (selectedYear !== 'all') {
      monthSel.style.display = '';
      populateMonths(parseInt(selectedYear));
    } else {
      monthSel.style.display = 'none';
      selectedMonth = 'all';
    }
    applyFilters();
  });

  document.getElementById('month-select').addEventListener('change', e => {
    selectedMonth = e.target.value;
    applyFilters();
  });

  applyFilters();
}

function populateMonths(year) {
  const months = [...new Set(
    rawData.filter(d => d.date.getFullYear() === year).map(d => d.date.getMonth())
  )].sort((a,b) => a-b);
  const sel = document.getElementById('month-select');
  sel.innerHTML = '<option value="all">Tous les mois</option>';
  months.forEach(m => sel.innerHTML += `<option value="${m}">${MONTH_FULL[m]}</option>`);
}

function applyFilters() {
  let data = [...rawData];

  if (selectedYear !== 'all') {
    data = data.filter(d => d.date.getFullYear() === parseInt(selectedYear));
  }
  if (selectedMonth !== 'all') {
    data = data.filter(d => d.date.getMonth() === parseInt(selectedMonth));
  }

  if (currentPeriod === 'week') {
    const now = new Date(Math.max(...rawData.map(d => d.date)));
    const weekAgo = new Date(now - 7 * 86400000);
    data = data.filter(d => d.date >= weekAgo);
  } else if (currentPeriod === 'month') {
    const now = new Date(Math.max(...rawData.map(d => d.date)));
    const monthAgo = new Date(now - 30 * 86400000);
    data = data.filter(d => d.date >= monthAgo);
  } else if (currentPeriod === 'year') {
    const now = new Date(Math.max(...rawData.map(d => d.date)));
    const yearAgo = new Date(now - 365 * 86400000);
    data = data.filter(d => d.date >= yearAgo);
  }

  filteredData = data;
  render();
}

// =========================================================
// HELPERS
// =========================================================
function countBy(data, key) {
  const map = {};
  data.forEach(d => {
    const k = d[key];
    map[k] = (map[k] || 0) + 1;
  });
  return Object.entries(map).sort((a,b) => b[1]-a[1]);
}

function countTracks(data) {
  const map = {};
  data.forEach(d => {
    const k = d.trackName + '__' + d.artistName;
    if (!map[k]) map[k] = { name: d.trackName, artist: d.artistName, album: d.albumName, count: 0 };
    map[k].count++;
  });
  return Object.values(map).sort((a,b) => b.count - a.count);
}

function countAlbums(data) {
  const map = {};
  data.forEach(d => {
    const k = d.albumName + '__' + d.artistName;
    if (!map[k]) map[k] = { album: d.albumName, artist: d.artistName, count: 0 };
    map[k].count++;
  });
  return Object.values(map).sort((a,b) => b.count - a.count);
}

// =========================================================
// DETAIL PAGE NAVIGATION
// =========================================================
// detailView = null | { type: 'artist', name } | { type: 'album', name, artist }
let detailView = null;
let detailStack = []; // breadcrumb stack

function navigateTo(view) {
  if (detailView) detailStack.push(detailView);
  detailView = view;
  render();
}

function navigateBack() {
  detailView = detailStack.pop() || null;
  render();
}

function navigateToTab(tab) {
  detailView = null;
  detailStack = [];
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  render();
}

function render() {
  const content = document.getElementById('content');
  content.className = 'content fade-in';
  void content.offsetWidth;

  if (detailView) {
    if (detailView.type === 'artist') renderArtistDetail(content, detailView.name);
    else if (detailView.type === 'album') renderAlbumDetail(content, detailView.name, detailView.artist);
    return;
  }

  if (currentTab === 'overview') renderOverview(content);
  else if (currentTab === 'tracks') renderTracks(content);
  else if (currentTab === 'artists') renderArtists(content);
  else if (currentTab === 'albums') renderAlbums(content);
  else if (currentTab === 'timeline') renderTimeline(content);
}

function renderBreadcrumb() {
  const parts = [];
  // Reconstruct breadcrumb from stack + current
  const allViews = [...detailStack, detailView];
  // Start with tab
  const tabLabels = { tracks: 'Titres', artists: 'Artistes', albums: 'Albums', overview: 'Vue d\'ensemble' };
  parts.push(`<span class="bc-link" data-action="back-root">${tabLabels[currentTab] || currentTab}</span>`);
  allViews.forEach((v, i) => {
    if (!v) return;
    const isLast = i === allViews.length - 1;
    const label = v.type === 'artist' ? v.name : `${v.name}`;
    if (isLast) parts.push(`<span class="bc-current">${escHtml(label)}</span>`);
    else parts.push(`<span class="bc-link" data-action="back-${i}">${escHtml(label)}</span>`);
  });
  return `<div class="breadcrumb">${parts.join('<span class="bc-sep">›</span>')}</div>`;
}

// TIMELINE STATE
// =========================================================
let tlOffset = 0; // navigation offset (in units of the current granularity)

function getTimelineMode() {
  if (selectedMonth !== 'all') return 'month'; // show weeks + days
  if (selectedYear !== 'all') return 'year';   // show months + weeks
  return 'all';                                 // show years (or all by year)
}

function getWeekKey(date) {
  // ISO week: Monday-based
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const week = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getUTCFullYear()}-W${String(week).padStart(2,'0')}`;
}

function getWeekLabel(key) {
  // key = YYYY-Www → find Monday of that week
  const [y, w] = key.split('-W').map(Number);
  const jan4 = new Date(Date.UTC(y, 0, 4));
  const startOfWeek = new Date(jan4);
  startOfWeek.setUTCDate(jan4.getUTCDate() - (jan4.getUTCDay() || 7) + 1 + (w - 1) * 7);
  return `${startOfWeek.getUTCDate()}/${startOfWeek.getUTCMonth()+1}`;
}

function renderTimeline(el) {
  const mode = getTimelineMode();

  // Aggregate data
  const byYear = {}, byMonth = {}, byWeek = {}, byDay = {};
  rawData.forEach(d => {
    const y = String(d.date.getFullYear());
    const m = `${d.date.getFullYear()}-${String(d.date.getMonth()+1).padStart(2,'0')}`;
    const w = getWeekKey(d.date);
    const day = d.date.toISOString().split('T')[0];
    byYear[y] = (byYear[y]||0)+1;
    byMonth[m] = (byMonth[m]||0)+1;
    byWeek[w] = (byWeek[w]||0)+1;
    byDay[day] = (byDay[day]||0)+1;
  });

  // Sorted unique keys across ALL data (for nav)
  const allYears  = Object.keys(byYear).sort();
  const allMonths = Object.keys(byMonth).sort();
  const allWeeks  = Object.keys(byWeek).sort();

  let charts = [];

  if (mode === 'all') {
    // No year/month selected → show by year (no nav needed, all years visible)
    const labels = allYears;
    const values = labels.map(k => byYear[k]);
    charts = [{ id:'c1', title:'Écoutes par année', labels, values, color:'#c8f25a', nav: null }];

  } else if (mode === 'year') {
    // Year selected → show months of that year (nav: prev/next year)
    const yearKeys = allMonths.filter(m => m.startsWith(selectedYear));
    const weekKeys = allWeeks.filter(w => w.startsWith(selectedYear));

    const navYears = allYears;
    const curYearIdx = navYears.indexOf(selectedYear);

    charts = [
      {
        id:'c1', title:`Écoutes par mois — ${selectedYear}`,
        labels: yearKeys.map(k => MONTHS[parseInt(k.split('-')[1])-1]),
        values: yearKeys.map(k => byMonth[k]),
        color:'#c8f25a',
        nav: { prev: navYears[curYearIdx-1]||null, next: navYears[curYearIdx+1]||null, type:'year', label: selectedYear }
      },
      {
        id:'c2', title:`Écoutes par semaine — ${selectedYear}`,
        labels: weekKeys.map(getWeekLabel),
        values: weekKeys.map(k => byWeek[k]),
        color:'#5ac8f2',
        nav: null
      }
    ];

  } else if (mode === 'month') {
    // Month selected → show weeks + days of that month (nav: prev/next month)
    const yearMonth = `${selectedYear}-${String(parseInt(selectedMonth)+1).padStart(2,'0')}`;
    const weekKeys = allWeeks.filter(w => {
      // include weeks that overlap this month
      const [y, wn] = w.split('-W').map(Number);
      const jan4 = new Date(Date.UTC(y, 0, 4));
      const mon = new Date(jan4);
      mon.setUTCDate(jan4.getUTCDate() - (jan4.getUTCDay()||7) + 1 + (wn-1)*7);
      const sun = new Date(mon); sun.setUTCDate(mon.getUTCDate()+6);
      const monthStart = new Date(Date.UTC(parseInt(selectedYear), parseInt(selectedMonth), 1));
      const monthEnd = new Date(Date.UTC(parseInt(selectedYear), parseInt(selectedMonth)+1, 0));
      return mon <= monthEnd && sun >= monthStart;
    });
    const dayKeys = Object.keys(byDay).filter(d => d.startsWith(yearMonth)).sort();

    // Nav months available for selected year
    const monthsInYear = allMonths.filter(m => m.startsWith(selectedYear));
    const curMonthKey = yearMonth;
    const curMIdx = monthsInYear.indexOf(curMonthKey);
    // Also check adjacent years
    const allMonthsAll = allMonths;
    const curMIdxAll = allMonthsAll.indexOf(curMonthKey);

    charts = [
      {
        id:'c1', title:`Écoutes par semaine — ${MONTH_FULL[parseInt(selectedMonth)]} ${selectedYear}`,
        labels: weekKeys.map(getWeekLabel),
        values: weekKeys.map(k => (byWeek[k]||0)),
        color:'#c8f25a',
        nav: {
          prev: allMonthsAll[curMIdxAll-1]||null,
          next: allMonthsAll[curMIdxAll+1]||null,
          type:'month',
          label: `${MONTH_FULL[parseInt(selectedMonth)]} ${selectedYear}`
        }
      },
      {
        id:'c2', title:`Écoutes par jour — ${MONTH_FULL[parseInt(selectedMonth)]} ${selectedYear}`,
        labels: dayKeys.map(d => d.split('-')[2]),
        values: dayKeys.map(k => byDay[k]),
        color:'#f25a8a',
        nav: null
      }
    ];
  }

  // Render HTML
  const navBtn = (dir, key, type) => key
    ? `<button class="nav-btn" data-dir="${dir}" data-key="${key}" data-type="${type}">${dir === 'prev' ? '←' : '→'}</button>`
    : `<button class="nav-btn" disabled>${dir === 'prev' ? '←' : '→'}</button>`;

  el.innerHTML = charts.map(c => `
    <div class="timeline-section">
      <div class="section-header">
        <div class="section-title">${c.title}</div>
        ${c.nav ? `<div class="nav-controls">${navBtn('prev', c.nav.prev, c.nav.type)}<span class="nav-label">${c.nav.label}</span>${navBtn('next', c.nav.next, c.nav.type)}</div>` : ''}
      </div>
      <div class="chart-container" style="position:relative">
        <canvas id="${c.id}" height="120"></canvas>
        <div id="tooltip" style="display:none;position:fixed;background:#18181d;border:1px solid #2a2a35;padding:0.3rem 0.6rem;font-size:0.7rem;font-family:'Space Mono',monospace;color:#e8e8f0;pointer-events:none;z-index:999;white-space:nowrap;"></div>
      </div>
    </div>
  `).join('');

  // Draw
  charts.forEach(c => drawBarChart(c.id, c.labels, c.values, c.color));

  // Nav button events
  el.querySelectorAll('.nav-btn:not([disabled])').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.key;
      const type = btn.dataset.type;
      if (type === 'year') {
        selectedYear = key;
        selectedMonth = 'all';
        document.getElementById('year-select').value = key;
        document.getElementById('month-select').style.display = '';
        populateMonths(parseInt(key));
      } else if (type === 'month') {
        const [y, m] = key.split('-');
        selectedYear = y;
        selectedMonth = String(parseInt(m)-1);
        document.getElementById('year-select').value = y;
        document.getElementById('month-select').style.display = '';
        populateMonths(parseInt(y));
        setTimeout(() => { document.getElementById('month-select').value = selectedMonth; }, 10);
      }
      applyFilters();
    });
  });
}

// CHARTS (native canvas, no lib)
// =========================================================
function drawBarChart(canvasId, labels, values, color) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.parentElement.clientWidth - 48;
  const h = parseInt(canvas.getAttribute('height')) || 120;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const max = Math.max(...values, 1);
  const pad = { top: 10, right: 10, bottom: 30, left: 35 };
  const chartW = w - pad.left - pad.right;
  const chartH = h - pad.top - pad.bottom;
  const slotW = chartW / (labels.length || 1);
  const barW = Math.max(2, slotW - Math.max(2, slotW * 0.15));

  // Store bar positions for hit detection
  const bars = labels.map((label, i) => {
    const x = pad.left + i * slotW + (slotW - barW) / 2;
    const bh = (values[i] / max) * chartH;
    const y = pad.top + chartH - bh;
    return { x, y, bh, barW, label, value: values[i] };
  });

  function draw(hoveredIdx) {
    ctx.clearRect(0, 0, w, h);

    // Grid
    ctx.strokeStyle = '#2a2a35';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const gy = pad.top + chartH - (i / 4) * chartH;
      ctx.beginPath();
      ctx.moveTo(pad.left, gy);
      ctx.lineTo(pad.left + chartW, gy);
      ctx.stroke();
      ctx.fillStyle = '#666680';
      ctx.font = `9px Space Mono, monospace`;
      ctx.textAlign = 'right';
      ctx.fillText(Math.round((i / 4) * max), pad.left - 5, gy + 3);
    }

    bars.forEach(({ x, y, bh, barW, label, value }, i) => {
      const isHovered = i === hoveredIdx;
      ctx.fillStyle = isHovered ? color : color + '99';
      ctx.fillRect(x, y, barW, bh);
      ctx.fillStyle = color;
      ctx.fillRect(x, y, barW, 2);

      if (labels.length <= 30 || i % Math.ceil(labels.length / 15) === 0) {
        ctx.fillStyle = isHovered ? '#e8e8f0' : '#666680';
        ctx.font = `8px Space Mono, monospace`;
        ctx.textAlign = 'center';
        ctx.save();
        ctx.translate(x + barW/2, pad.top + chartH + 18);
        if (labels.length > 20) ctx.rotate(-Math.PI/4);
        ctx.fillText(String(label).slice(0, 7), 0, 0);
        ctx.restore();
      }
    });
  }

  draw(-1);

  // Tooltip
  const tooltip = document.getElementById('tooltip');

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left);
    const my = (e.clientY - rect.top);
    let found = -1;
    bars.forEach(({ x, y, barW, bh }, i) => {
      if (mx >= x && mx <= x + barW && my >= pad.top && my <= pad.top + chartH) found = i;
    });
    draw(found);
    if (found >= 0) {
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 28) + 'px';
      tooltip.textContent = `${bars[found].label} — ${bars[found].value} écoute${bars[found].value > 1 ? 's' : ''}`;
    } else {
      tooltip.style.display = 'none';
    }
  });

  canvas.addEventListener('mouseleave', () => {
    draw(-1);
    if (tooltip) tooltip.style.display = 'none';
  });
}

function drawHourChart() {
  const hourData = Array(24).fill(0);
  filteredData.forEach(d => hourData[d.date.getHours()]++);
  // set height attr before calling
  const c = document.getElementById('hourChart');
  if (c) c.setAttribute('height', '120');
  drawBarChart('hourChart', Array.from({length:24}, (_,i) => i+'h'), hourData, '#c8f25a');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
